<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Passwords</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="manifest" href="manifest.json">
    </head>
    <body>
        <form id="unlock-form">
            <p id="unlock-error"></p>
            <input type="text" id="username" placeholder="Username..." required>
            <input type="password" id="password" placeholder="Password..." required>
            <input type="checkbox" id="create-new"> <label for="create-new">Create new vault</label><br><br>
            <button type="submit" id="unlock-button">Unlock</button>
        </form>
        <div id="vault-view" style="display: none">
            <p id="save-error"></p>
            <p style="display: flex; flex-direction: row;">
                <input type="text" id="search" placeholder="Search..." style="flex-grow: 1; margin: 0; margin-right: 0.5em;">
                <button id="add-button" class="button-blue" style="width: 5em">+ Add</button>
            </p>
            <div id="passwords-table"></div>
        </div>
        <dialog id="editor">
            <form id="editor-form">
                <label for="entry-name">Entry Name</label>
                <input type="text" id="entry-name" required>
                <label for="entry-username">Username</label>
                <input type="text" id="entry-username">
                <label for="entry-email">Email</label>
                <input type="email" id="entry-email">
                <label for="entry-password">Password</label>
                <div style="margin-bottom: 1em;">
                    <div style="display: flex; flex-direction: row; margin-bottom: 0.5em">
                        <input type="password" id="entry-password" style="flex-grow: 1; margin: 0; margin-right: 0.5em;" required>
                        <button id="autogen-password" type="button">Generate</button>
                    </div>
                    <div>
                        <input type="checkbox" id="spaces" checked><label for="spaces">spaces</label>
                        <input type="checkbox" id="symbols"><label for="symbols">symbols</label>
                        <input type="checkbox" id="capitals"><label for="capitals">capitals</label>
                    </div>
                </div>
                <label for="entry-url">URL</label>
                <input type="text" id="entry-url">
                <button type="submit" class="button-blue">Save</button> <button id="entry-cancel">Cancel</button>
            </form>
        </dialog>
        <script src="main.js"></script>
    </body>
</html>
